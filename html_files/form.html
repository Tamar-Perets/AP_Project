<!-- this file enable user upload files and send messages to different topics -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forms</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-section { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="form-section">
		<!-- form of choosing and uploading config file -->
        <h3>Load Configuration</h3>
        <form action="http://localhost:8080/upload" method="post" enctype="multipart/form-data" target="graph_frame">
            <div class="form-group">
                <label for="configFile">Choose File:</label>
                <input type="file" id="configFile" name="configFile" required>
            </div>
            <button type="submit">Deploy</button>
        </form>
    </div>
	
	<!-- form that allows sending message for some topic -->
    <div class="form-section">
        <h3>Publish Message</h3>
        <form action="http://localhost:8080/publish" method="get" target="table_frame">
            <div class="form-group">
                <label for="topicName">Topic name:</label>
                <input type="text" id="topicName" name="topicName" required>
            </div>
            <div class="form-group">
                <label for="message">Message:</label>
                <input type="text" id="message" name="message" required>
            </div>
            <button type="submit">Send</button>
        </form>
    </div>

</body>
</html>
